# ---- VirtualService × 8 ---------------------------------------------------
# Bound to istio-system/dfsp-egress (the Gateway above).
# - Matches URI prefix /sim/fspNNN/inbound/, rewrites to /.
# - Routes to the SE host on port 443. The DR (below) attaches MUTUAL TLS
#   on this port.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: sim-fsp201
  namespace: mojaloop
spec:
  hosts: [sim-fsp201.local]
  gateways: [istio-system/dfsp-egress]
  http:
    - match:
        - uri: { prefix: /sim/fsp201/inbound/ }
      rewrite:
        uri: /
      route:
        - destination:
            host: sim-fsp201.local
            port: { number: 443 }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
