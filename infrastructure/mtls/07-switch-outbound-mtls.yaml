# ---- DestinationRule × 8 --------------------------------------------------
# MUTUAL TLS origination on port 443. credentialName references a Secret in
# the egress gateway's namespace (istio-system). SNI is the DFSP hostname so
# the DFSP nginx ssl-passthrough Ingress can route on it.
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: sim-fsp201
  namespace: mojaloop
spec:
  host: sim-fsp201.local
  trafficPolicy:
    portLevelSettings:
      - port: { number: 443 }
        tls:
          mode: MUTUAL
          credentialName: switch-mtls-creds
          sni: sim-fsp201.local
---
