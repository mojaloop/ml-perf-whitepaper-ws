# Default values for promfana.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

kps:
  grafana:
    nodeSelector:
      node-role: monitoring
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule

  prometheus:
    service:
      type: NodePort
      nodePort: 30090
    prometheusSpec:
      enableRemoteWriteReceiver: true # Enable Remote Write Receiver
      nodeSelector:
        node-role: monitoring
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule

  prometheusOperator:
    nodeSelector:
      node-role: monitoring
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule

  kube-state-metrics:
    nodeSelector:
      node-role: monitoring
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule

  # ⚠️ Keep node-exporter as DaemonSet on all nodes
  prometheus-node-exporter:
    nodeSelector: {}