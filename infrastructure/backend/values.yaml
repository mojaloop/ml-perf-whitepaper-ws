## Proxy Cache Redis Cluster with Metrics
proxy-cache-redis:
  enabled: true
  usePassword: false
  fullnameOverride: proxy-cache-redis
  clusterDomain: cluster.local

  # Override image to use current available version
  image:
    registry: docker.io
    repository: bitnamilegacy/redis-cluster
    tag: 7.4.1

  persistence:
    enabled: false

  cluster:
    init: true
    nodes: 6
    replicas: 1

  # Redis Cluster metrics configuration
  metrics:
    enabled: true
    port: 9121
    # Override metrics exporter image
    image:
      registry: docker.io
      repository: bitnamilegacy/redis-exporter
      tag: 1.66.0
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    resources:
      limits:
        memory: 128Mi
      requests:
        memory: 64Mi
        cpu: 50m

  # Pod annotations for all cluster nodes
  redis:
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9121"
      prometheus.io/path: "/metrics"