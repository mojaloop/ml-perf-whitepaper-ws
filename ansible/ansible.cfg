[defaults]
host_key_checking = False
inventory = ../scenarios/base/artifacts/inventory.yaml
roles_path = ./roles
remote_user = ubuntu
# private_key_file is set via ANSIBLE_PRIVATE_KEY_FILE env var by the
# root Makefile, derived from SSH_KEY_NAME in the root .env.
stdout_callback = ansible.builtin.default
result_format = yaml
callback_enabled = timer
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ServerAliveInterval=60
pipelining = True