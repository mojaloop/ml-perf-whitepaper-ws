---
# Generates two DNS-wiring artifacts from the Terraform-emitted inventory:
#   * hostaliases.json        — strategic-merge patch applied to mojaloop switch
#                                deployments/statefulset so pods can resolve sim-fspNNN.local
#   * k6-coredns-hosts.conf   — CoreDNS `hosts { ... }` block spliced into the k6
#                                cluster's coredns ConfigMap so k6 pods can resolve
#                                sim-fspNNN.local AND the switch services
#
# TODO(future): replace first-generic-node IP with the switch LB IP once an internal
# LB private-IP output exists.
- name: Generate DNS-wiring artifacts (mojaloop hostaliases + k6 CoreDNS hosts)
  hosts: localhost
  gather_facts: no
  vars:
    artifacts_dir: "{{ playbook_dir }}/../../performance-tests/results/{{ scenario | default('base', true) }}/artifacts"
    # First generic switch worker (sw1-n1, sw1-n2, ...) — used as switch IP target today.
    switch_ip: "{{ hostvars[(groups['switch'] | select('match', '^sw1-n[0-9]+$') | sort | first)]['private_ip'] }}"
  tasks:
    - name: Render hostaliases.json (for mojaloop switch-side hostAliases patch)
      template:
        src: ../templates/hostaliases.json.j2
        dest: "{{ artifacts_dir }}/hostaliases.json"
        mode: '0644'

    - name: Render k6-coredns-hosts.conf (CoreDNS hosts block for the k6 cluster)
      template:
        src: ../templates/k6-coredns-hosts.conf.j2
        dest: "{{ artifacts_dir }}/k6-coredns-hosts.conf"
        mode: '0644'

    - name: Show rendered paths
      debug:
        msg:
          - "hostaliases.json      -> {{ artifacts_dir }}/hostaliases.json"
          - "k6-coredns-hosts.conf -> {{ artifacts_dir }}/k6-coredns-hosts.conf (switch_ip={{ switch_ip }})"
