---
# Per-FSP deployment loop body. fsp_idx (e.g. 201) is supplied by the
# parent loop in main.yml.

- name: "fsp{{ fsp_idx }}: set facts"
  ansible.builtin.set_fact:
    fsp_name: "fsp{{ fsp_idx }}"
    kc_fsp: "{{ kubeconfig_dir }}/kubeconfig-fsp{{ fsp_idx }}.yaml"
    fsp_values: "{{ dfsp_values_dir }}/values-fsp{{ fsp_idx }}.yaml"
    fsp_sdk_deploy: "dfsp-sim-fsp{{ fsp_idx }}-scheme-adapter"

# ---- ns + dockerhub-secret + SA patch ----

- name: "fsp{{ fsp_idx }}: ensure namespace"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} create ns {{ ns_dfsps }} \
      --dry-run=client -o yaml | kubectl --kubeconfig={{ kc_fsp }} apply -f -
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "fsp{{ fsp_idx }}: dockerhub-secret"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} \
      create secret docker-registry dockerhub-secret \
      --docker-server=https://index.docker.io/v1/ \
      --docker-username='{{ dockerhub_username }}' \
      --docker-password='{{ dockerhub_token }}' \
      --docker-email='{{ dockerhub_email }}' \
      --dry-run=client -o yaml | kubectl --kubeconfig={{ kc_fsp }} apply -f -
  changed_when: false
  no_log: true
  environment: "{{ kubectl_env }}"

- name: "fsp{{ fsp_idx }}: patch default SA with imagePullSecrets"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} patch serviceaccount default \
      -p '{"imagePullSecrets": [{"name": "dockerhub-secret"}]}'
  changed_when: false
  failed_when: false
  environment: "{{ kubectl_env }}"

# ---- mTLS Phase 1B prep on the cluster (idempotent capability switches) ----

- name: "fsp{{ fsp_idx }}: enable nginx ssl-passthrough"
  ansible.builtin.shell: |
    if ! kubectl --kubeconfig={{ kc_fsp }} -n ingress get daemonset nginx-ingress-microk8s-controller \
         -o jsonpath='{.spec.template.spec.containers[0].args}' | grep -q enable-ssl-passthrough; then
      kubectl --kubeconfig={{ kc_fsp }} -n ingress patch daemonset nginx-ingress-microk8s-controller --type=json -p='[
        {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-ssl-passthrough"}
      ]'
      kubectl --kubeconfig={{ kc_fsp }} -n ingress rollout status daemonset nginx-ingress-microk8s-controller --timeout=180s
    fi
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "fsp{{ fsp_idx }}: apply DFSP TLS secret"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} apply -f {{ dfsp_tls_secret }}
  register: _dfsp_secret
  changed_when: "'created' in _dfsp_secret.stdout or 'configured' in _dfsp_secret.stdout"
  environment: "{{ kubectl_env }}"

# ---- helm install simulator ----

- name: "fsp{{ fsp_idx }}: stat scenario dfsp.yaml override"
  ansible.builtin.stat:
    path: "{{ scenario_overrides_dir }}/dfsp.yaml"
  register: _scenario_dfsp_stat

- name: "fsp{{ fsp_idx }}: build scenario override -f arg"
  ansible.builtin.set_fact:
    _fsp_override_arg: "{{ '--values ' ~ scenario_overrides_dir ~ '/dfsp.yaml' if _scenario_dfsp_stat.stat.exists else '' }}"

- name: "fsp{{ fsp_idx }}: helm install simulator"
  ansible.builtin.shell: |
    helm --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} upgrade --install \
      {{ dfsp_release }} {{ dfsp_chart }} \
      --version {{ dfsp_version }} \
      --values {{ fsp_values }} {{ _fsp_override_arg }} \
      --create-namespace \
      --wait --timeout 10m
  register: _dfsp_helm
  changed_when: "'has been upgraded' in _dfsp_helm.stdout or 'has been deployed' in _dfsp_helm.stdout"
  environment: "{{ kubectl_env }}"

# Defuse :80 -> :443 auto-redirect that fires once a TLS Ingress appears.
- name: "fsp{{ fsp_idx }}: disable ssl-redirect on simulator Ingress"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} annotate ingress dfsp-sim-simulators \
      nginx.ingress.kubernetes.io/ssl-redirect=false --overwrite
  changed_when: false
  environment: "{{ kubectl_env }}"

# Apply the per-DFSP passthrough Ingress (template substitutes fspNNN -> fspXXX).
- name: "fsp{{ fsp_idx }}: render+apply mTLS passthrough Ingress"
  ansible.builtin.shell: |
    sed 's/fspNNN/{{ fsp_name }}/g' {{ dfsp_passthrough_tmpl }} \
      | kubectl --kubeconfig={{ kc_fsp }} apply -f -
  register: _passthrough
  changed_when: "'created' in _passthrough.stdout or 'configured' in _passthrough.stdout"
  environment: "{{ kubectl_env }}"

# Swap the SDK's mounted TLS Secret to the shared mtls-shared-creds.
- name: "fsp{{ fsp_idx }}: patch SDK volumes to mtls-shared-creds"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} patch deployment {{ fsp_sdk_deploy }} --type=strategic -p '
    spec:
      template:
        spec:
          volumes:
          - name: tls-secrets
            secret:
              secretName: mtls-shared-creds'
  changed_when: false
  environment: "{{ kubectl_env }}"

# Flip mTLS env vars (Phase 2 OUTBOUND + Phase 3 INBOUND in one shot —
# safe because mtls_switch role applies CoreDNS + egress gateway BEFORE
# this role runs in the integrated deploy).
- name: "fsp{{ fsp_idx }}: enable OUTBOUND/INBOUND mTLS env vars"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} set env deployment/{{ fsp_sdk_deploy }} \
      --containers=scheme-adapter \
      OUTBOUND_MUTUAL_TLS_ENABLED=true \
      INBOUND_MUTUAL_TLS_ENABLED=true
  changed_when: false
  environment: "{{ kubectl_env }}"

# Patch hostAliases (switch services) + probe periodSeconds.
- name: "fsp{{ fsp_idx }}: patch hostAliases for switch services"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} patch deployment {{ fsp_sdk_deploy }} --type=json -p='[
      {"op":"add","path":"/spec/template/spec/hostAliases","value":[
        {"ip":"{{ switch_lb_ip }}","hostnames":["account-lookup-service.local","quoting-service.local","ml-api-adapter.local"]}
      ]}
    ]'
  changed_when: false
  failed_when: false
  environment: "{{ kubectl_env }}"

- name: "fsp{{ fsp_idx }}: relax probe periodSeconds"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} patch deployment {{ fsp_sdk_deploy }} --type=json -p='[
      {"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/periodSeconds","value":{{ dfsp_probe_period_seconds }}},
      {"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/periodSeconds","value":{{ dfsp_probe_period_seconds }}}
    ]'
  changed_when: false
  environment: "{{ kubectl_env }}"

# CoreDNS hosts{} block for switch services (DFSP cluster's own resolver).
- name: "fsp{{ fsp_idx }}: render DFSP CoreDNS Corefile"
  ansible.builtin.template:
    src: dfsp-coredns.j2
    dest: "{{ scenario_artifacts_dir }}/dfsp-{{ fsp_name }}-coredns.yaml"
    mode: '0644'

- name: "fsp{{ fsp_idx }}: patch DFSP cluster CoreDNS"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n kube-system patch configmap coredns \
      --type merge --patch-file {{ scenario_artifacts_dir }}/dfsp-{{ fsp_name }}-coredns.yaml
    kubectl --kubeconfig={{ kc_fsp }} -n kube-system rollout restart deployment coredns
    kubectl --kubeconfig={{ kc_fsp }} -n kube-system rollout status  deployment coredns --timeout=120s
  changed_when: false
  environment: "{{ kubectl_env }}"

# Final scale-out.
- name: "fsp{{ fsp_idx }}: scale scheme-adapter to {{ dfsp_replicas }}"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} scale deployment {{ fsp_sdk_deploy }} \
      --replicas={{ dfsp_replicas }}
    kubectl --kubeconfig={{ kc_fsp }} -n {{ ns_dfsps }} rollout status deployment/{{ fsp_sdk_deploy }} --timeout=600s
  changed_when: false
  environment: "{{ kubectl_env }}"
