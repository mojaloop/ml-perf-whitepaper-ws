---
# DFSP onboarding via TTK collections — registers the 8 sims with the hub,
# adjusts participant limits, registers oracle endpoints, etc.
#
# Two collections, run in order:
#   1. MojaloopSims_Onboarding  — register the 8 sims as participants
#   2. CGS_Specific             — limits + oracle + ALS user provisioning
#
# Both are run via the same ttk-cli Job pattern as switch_onboard.

ttk_collections_root: "{{ repo_root }}/ttk-collections"
ttk_env_file:         "{{ ttk_collections_root }}/perf-env-example.json"
ttk_cli_image: mojaloop/ml-testing-toolkit-client-lib:13.4.4
ttk_job_ns:    "{{ ns_mojaloop }}"
ttk_job_timeout: 600

dfsp_onboard_collections:
  - name: sims-onboarding
    dir: "{{ ttk_collections_root }}/hub/provisioning/for_golden_path/MojaloopSims_Onboarding"
  - name: cgs-specific
    dir: "{{ ttk_collections_root }}/hub/provisioning/for_golden_path/CGS_Specific"
