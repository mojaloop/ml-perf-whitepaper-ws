---
# Per-collection runner. coll = {name: <slug>, dir: <path>} from parent loop.

- name: "{{ coll.name }}: verify collection dir"
  ansible.builtin.stat:
    path: "{{ coll.dir }}"
  register: _stat

- name: "{{ coll.name }}: fail if missing"
  ansible.builtin.fail:
    msg: "Collection {{ coll.name }} not found at {{ coll.dir }}"
  when: not _stat.stat.exists

- name: "{{ coll.name }}: stage tmp dir"
  ansible.builtin.file:
    path: "{{ scenario_artifacts_dir }}/ttk-{{ coll.name }}"
    state: directory
    mode: '0755'

- name: "{{ coll.name }}: copy env file"
  ansible.builtin.copy:
    src: "{{ ttk_env_file }}"
    dest: "{{ scenario_artifacts_dir }}/ttk-{{ coll.name }}/env.json"
    mode: '0644'

- name: "{{ coll.name }}: find collection JSONs"
  ansible.builtin.find:
    paths: "{{ coll.dir }}"
    patterns: "*.json"
    recurse: true
  register: _jsons

- name: "{{ coll.name }}: copy collection files"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ scenario_artifacts_dir }}/ttk-{{ coll.name }}/{{ item.path | basename }}"
    mode: '0644'
  loop: "{{ _jsons.files }}"

- name: "{{ coll.name }}: (re)create configmap"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_switch }} -n {{ ttk_job_ns }} create configmap \
      ttk-{{ coll.name }}-collection \
      --from-file={{ scenario_artifacts_dir }}/ttk-{{ coll.name }}/ \
      --dry-run=client -o yaml \
      | kubectl --kubeconfig={{ kc_switch }} apply -f -
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "{{ coll.name }}: render Job"
  ansible.builtin.template:
    src: ttk-job.yaml.j2
    dest: "{{ scenario_artifacts_dir }}/ttk-{{ coll.name }}/job.yaml"
    mode: '0644'

- name: "{{ coll.name }}: delete prior Job"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_switch }} -n {{ ttk_job_ns }} delete job \
      ttk-{{ coll.name }} --ignore-not-found
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "{{ coll.name }}: apply Job"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_switch }} apply -f \
      {{ scenario_artifacts_dir }}/ttk-{{ coll.name }}/job.yaml
  register: _job_apply
  changed_when: "'created' in _job_apply.stdout or 'configured' in _job_apply.stdout"
  environment: "{{ kubectl_env }}"

- name: "{{ coll.name }}: wait for Job to complete"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_switch }} -n {{ ttk_job_ns }} wait \
      --for=condition=complete job/ttk-{{ coll.name }} \
      --timeout={{ ttk_job_timeout }}s
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "{{ coll.name }}: capture logs"
  ansible.builtin.shell: |
    kubectl --kubeconfig={{ kc_switch }} -n {{ ttk_job_ns }} logs job/ttk-{{ coll.name }}
  register: _job_logs
  changed_when: false
  environment: "{{ kubectl_env }}"

- name: "{{ coll.name }}: show logs (head)"
  ansible.builtin.debug:
    msg: "{{ _job_logs.stdout_lines[:60] }}"
