k6:
  targetTxnCount: 500000
  abortOnError: false
  transferAmount: "1" # transfer amount per transaction
  currency: "XXX"
  targetTps: 2000
  fspPairs:
    - source: fsp201
      dest: fsp202
      weight: 0.25 # 25% load
    - source: fsp203
      dest: fsp204
      weight: 0.25 # 25% load
    - source: fsp205
      dest: fsp206
      weight: 0.25 # 25% load
    - source: fsp207
      dest: fsp208
      weight: 0.25 # 25% load

  # fspConfig intentionally NOT redeclared here — common/k6.yaml provides
  # it as a YAML map. Overriding it as a JSON-string (`fspConfig: |`) would
  # collapse the map at Helm-merge time, and the chart's `toJson | b64enc`
  # would re-encode the string, breaking the runner's `JSON.parse(atob(...))`
  # (every FSPS[fspName] returns undefined → "Cannot read property
  # 'startMsisdn' of undefined" on every iteration). To override per-scenario,
  # redeclare as a YAML map matching common's shape.

resources:
  limits:
    cpu: "6"
    memory: "10Gi"
  requests:
    cpu: "3"
    memory: "5Gi"
