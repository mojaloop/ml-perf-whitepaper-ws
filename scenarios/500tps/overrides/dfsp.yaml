# Per-scenario DFSP simulator overrides — layered on top of
# common/dfsp/values-fspNNN.yaml by the dfsp role's per_fsp loop.
#
# Today:
#   - pins the kirgene/sdk-scheme-adapter:jws-fix image (workaround
#     for an unreleased upstream JWS fix; revert to
#     mojaloop/sdk-scheme-adapter:v24.12.0 once it ships)
#   - bumps scheme-adapter replicaCount to 8 per FSP (required for
#     500tps headroom; also lets each callback shard a Kafka partition)
# One block per FSP because the values structure is keyed by simulator name.

simulators:
  fsp201:
    config:
      schemeAdapter:
        env:
          # Phase 2 (OUTBOUND) + Phase 3 (INBOUND) mTLS — declarative.
          OUTBOUND_MUTUAL_TLS_ENABLED: "true"
          INBOUND_MUTUAL_TLS_ENABLED: "true"
        image:
          repository: kirgene/sdk-scheme-adapter
          tag: jws-fix
